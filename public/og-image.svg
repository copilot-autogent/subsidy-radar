<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#2563eb"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#ffffff" fill-opacity="0.05"/>
  <circle cx="150" cy="530" r="150" fill="#ffffff" fill-opacity="0.05"/>
  <!-- Radar icon -->
  <text x="120" y="300" font-size="120" font-family="system-ui, sans-serif">📡</text>
  <!-- Title -->
  <text x="120" y="390" font-size="72" font-weight="700" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">補助雷達</text>
  <!-- Subtitle -->
  <text x="120" y="460" font-size="36" fill="#bfdbfe" font-family="system-ui, -apple-system, sans-serif">台灣政府補助一站查詢平台</text>
  <!-- Description -->
  <text x="120" y="520" font-size="28" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif">住宅・能源・教育・創業補助，快速找到您符合資格的補助</text>
</svg>
